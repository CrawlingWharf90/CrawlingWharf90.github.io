<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nadav Moscovici - PROJECTS.exe</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Unified Elegant Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Karantina:wght@300;400&family=JetBrains+Mono:wght@100;300;400&display=swap" rel="stylesheet">

<body class="lux-glitch-in">
    <div class="scanlines"></div>

    <div id="go-back-btn">
        <button class="lux-btn" id="return-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-caret-left" viewBox="0 0 16 16" style="margin-bottom: 2px;">

            RETURN
        </button>

    <!-- UI Layers -->
    <div id="background-image" class="lazyload"></div>
    
    <div id="project-list">
        <!--PROJECTS ARE ADDED HERE BY JS-->
    </div>
    
    <div id="project-description">
        <div id="project-description-title" class="lux-glow"></div>
        <div id="project-description-text" class="glass-panel"></div>
        <div id="project-description-link"><a target="_blank" class="external-link"></a></div>
    </div>

    <!-- Global Fixed Footer with Dynamic Year -->
    <footer id="project-footer">
        <p class="data-dim">SYSTEM_HALTED. © <span class="dynamic-year"></span> Nadav Moscovici. ALL RIGHTS RESERVED.</p>
    </footer>

    <script type="module" src="../static/js/projects.js"></script>
